<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shop Troubleshooting — Richard S. Batin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f7;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1814;
  --text3: #9e9a94;
  --accent: #c9622f;
  --accent-bg: #fdf0ea;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;line-height:1.6;padding:48px 32px;}
.wrap{max-width:820px;margin:0 auto;}
.header{margin-bottom:32px;}
.eyebrow{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:8px;}
.sub{color:var(--text3);font-size:14px;font-weight:300;}
.tabs{display:flex;gap:8px;margin:32px 0 24px;border-bottom:1px solid var(--border);}
.tab-btn{background:none;border:none;padding:12px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover{color:var(--text);}
.panel{display:none;}
.panel.active{display:block;}
.flow-box{cursor:pointer;}
.flow-box rect{transition:fill 0.15s ease, stroke-width 0.15s ease;}
.flow-box:hover rect{fill:var(--accent-bg);stroke:var(--accent);stroke-width:2;}
.flow-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;fill:var(--text);}
.flow-sub{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:400;fill:var(--text3);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">TikTok Shop — A Dog's Tale / Chewtrition</div>
    <h1>Troubleshooting walkthrough</h1>
    <div class="sub">Richard S. Batin — how I'd approach both issues once inside the Seller Centre</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('stock')">Stock shows 0</button>
    <button class="tab-btn" onclick="showTab('affiliate')">Affiliate link issues</button>
  </div>

  <div class="panel active" id="stock">
    <svg width="100%" viewBox="0 0 620 320" role="img">
      <desc>Seven-step diagnostic chain arranged in a snaking three-column layout: FBM or FBT, inventory record, warehouse place, then reversing direction for SKUs, sync interval, webhooks, then dropping to others</desc>
      <defs>
        <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#c9622f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Row 1: 1 -> 2 -> 3 (left to right) -->
      <g class="flow-box">
        <rect x="10" y="20" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="100" y="42" text-anchor="middle" dominant-baseline="central">FBM or FBT</text>
        <text class="flow-sub" x="100" y="60" text-anchor="middle" dominant-baseline="central">Confirms who fulfills</text>
      </g>
      <line x1="190" y1="52" x2="215" y2="52" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <g class="flow-box">
        <rect x="215" y="20" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="305" y="42" text-anchor="middle" dominant-baseline="central">Inventory record</text>
        <text class="flow-sub" x="305" y="60" text-anchor="middle" dominant-baseline="central">TikTok's stored count</text>
      </g>
      <line x1="395" y1="52" x2="420" y2="52" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <g class="flow-box">
        <rect x="420" y="20" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="510" y="42" text-anchor="middle" dominant-baseline="central">Warehouse place</text>
        <text class="flow-sub" x="510" y="60" text-anchor="middle" dominant-baseline="central">Correct warehouse used</text>
      </g>

      <!-- drop from row1 col3 to row2 col3 -->
      <line x1="510" y1="84" x2="510" y2="124" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <!-- Row 2: 4 -> 5 -> 6 (right to left) -->
      <g class="flow-box">
        <rect x="420" y="124" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="510" y="146" text-anchor="middle" dominant-baseline="central">SKUs</text>
        <text class="flow-sub" x="510" y="164" text-anchor="middle" dominant-baseline="central">One SKU or several</text>
      </g>
      <line x1="420" y1="156" x2="395" y2="156" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <g class="flow-box">
        <rect x="215" y="124" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="305" y="146" text-anchor="middle" dominant-baseline="central">Sync interval</text>
        <text class="flow-sub" x="305" y="164" text-anchor="middle" dominant-baseline="central">How often it syncs</text>
      </g>
      <line x1="215" y1="156" x2="190" y2="156" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <g class="flow-box">
        <rect x="10" y="124" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="100" y="146" text-anchor="middle" dominant-baseline="central">Webhooks</text>
        <text class="flow-sub" x="100" y="164" text-anchor="middle" dominant-baseline="central">Failed update calls</text>
      </g>

      <!-- drop from row2 col1 to row3 col1 -->
      <line x1="100" y1="188" x2="100" y2="228" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a1)"/>

      <!-- Row 3: 7 -->
      <g class="flow-box">
        <rect x="10" y="228" width="180" height="64" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="100" y="250" text-anchor="middle" dominant-baseline="central">Others</text>
        <text class="flow-sub" x="100" y="268" text-anchor="middle" dominant-baseline="central">Override or duplicate</text>
      </g>
    </svg>
  </div>

  <div class="panel" id="affiliate">
    <svg width="100%" viewBox="0 0 620 220" role="img">
      <desc>Link auto-generates branches into three possible failure points: attribution not tracking, wrong destination, showcase not finalized</desc>
      <defs>
        <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#c9622f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <g class="flow-box">
        <rect x="170" y="20" width="280" height="58" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="310" y="42" text-anchor="middle" dominant-baseline="central">Link auto-generates</text>
        <text class="flow-sub" x="310" y="60" text-anchor="middle" dominant-baseline="central">Once approved + in showcase</text>
      </g>

      <line x1="310" y1="78" x2="310" y2="110" stroke="#c9622f" stroke-width="1.2"/>
      <line x1="105" y1="110" x2="515" y2="110" stroke="#c9622f" stroke-width="1.2"/>
      <line x1="105" y1="110" x2="105" y2="140" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a2)"/>
      <line x1="310" y1="110" x2="310" y2="140" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a2)"/>
      <line x1="515" y1="110" x2="515" y2="140" stroke="#c9622f" stroke-width="1.2" marker-end="url(#a2)"/>

      <g class="flow-box">
        <rect x="10" y="140" width="190" height="58" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="105" y="162" text-anchor="middle" dominant-baseline="central">Attribution fails</text>
        <text class="flow-sub" x="105" y="180" text-anchor="middle" dominant-baseline="central">Check creator dashboard</text>
      </g>

      <g class="flow-box">
        <rect x="215" y="140" width="190" height="58" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="310" y="162" text-anchor="middle" dominant-baseline="central">Wrong destination</text>
        <text class="flow-sub" x="310" y="180" text-anchor="middle" dominant-baseline="central">Confirm link target</text>
      </g>

      <g class="flow-box">
        <rect x="420" y="140" width="190" height="58" rx="8" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <text class="flow-title" x="515" y="162" text-anchor="middle" dominant-baseline="central">Showcase not final</text>
        <text class="flow-sub" x="515" y="180" text-anchor="middle" dominant-baseline="central">Confirm truly live</text>
      </g>
    </svg>
  </div>
</div>

<script>
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}
</script>
</body>
</html>
